<div>
  Messageing sending place
  <div id="messages" class="p-10">
    <button class="btn btn-primary p-2 bg-neutral-200" (click)="onSendMessage()">Send Test Message</button>
    <h2>Received messages</h2>
    <ol>
      @for(message of receivesMessage(); track message){
        <li class="message">{{message.content}}</li>
      }
    </ol>
  </div>
</div>

<hr>

<div>
  <h1>Presence testing place</h1>
  <div>
    <button (click)="onHeartbeat()" class="bg-neutral-200 p-3 m-2" type="button">Set online/Heatbeat</button>
  </div>
  <div>
    <button (click)="onOffline()" class="bg-neutral-200 p-3 m-2" type="button">Emplicit offline (Fake logout)</button>
  </div>

  <div>
    <span>Presence state: </span>
    @if(presence(); as p){
      <div>Status: {{p.status}}</div>
      <div>Last seen: {{p.lastSeen}}</div>
      <div>Connected at: {{p.connectedAt}}</div>
    }
  </div>
</div>
