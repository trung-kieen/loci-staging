<main id="main-content" class="flex h-[calc(100vh-4rem)]">
  <section id="chat-conversation" class="flex-1 bg-white flex flex-col">

    <!-- Header -->
    <app-chat-header
      [chat]="groupChatInfo()"
      [showBackButton]="true"
      [features]="groupChatFeatures"
      (back)="onBack()"
      (profileClick)="onViewGroupProfile()"
    />

    <!-- Message area -->
    <div
      #messageArea
      id="message-area"
      class="flex-1 overflow-y-auto p-4 space-y-4"
      (scroll)="onScroll($event)"
    >
      <!-- Pagination loading spinner -->
      @if (state.loading()) {
        <div class="flex justify-center py-4">
          <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-neutral-500"></div>
        </div>
      }

      <!-- Timeline: messages + system events -->
      @for (item of items(); track itemTrackId(item)) {

        @if (item.kind === 'message') {
          <app-message-bubble
            [isOwn]="item.data.owner"
            [message]="item.data"
            [showSenderName]="!item.data.owner"
            [avatarUrl]="getMessageSenderAvatarUrl(item.data)"
            [senderName]="getMessageSenderName(item.data)"
            [attr.data-message-id]="item.data.messageId"
            [attr.data-incoming]="!item.data.owner"
            (download)="onDownloadAttachment($event)"
          />
        } @else {
          <app-system-event-bubble [event]="item.data" />
        }

      }
    </div>

    <!-- Error alert -->
    @if (uiError() !== null) {
      <app-error-alert [error]="uiError()" (dismiss)="state.clearError()" />
    }

    <!-- Message input -->
    <app-message-input
      [isDisabled]="!canSendMessage()"
      [isSending]="state.sendingMessage()"
      [isUploading]="state.uploadingFile()"
      (send)="onSendMessage($event)"
      (fileSelect)="onFileSelected($event)"
    />

  </section>
</main>
