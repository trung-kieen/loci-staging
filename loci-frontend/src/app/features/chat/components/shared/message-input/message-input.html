<div class="p-4 border-t border-neutral-200 bg-white">
  <div class="flex items-end gap-3">

    <input type="file" #fileInput (change)="onFileSelected($event)" [disabled] = "isDisabled()" hidden [accept]="acceptedFileTypes()">

    <button class="p-2 text-neutral-400 hover:text-neutral-600 disabled:opacity-50 transition-colors"
      (click)="fileInput.click()" [disabled]="isUploading()"
      [attr.aria-label]="isUploading() ? 'Uploading file' : 'Attach file'">
      @if (isUploading()) {
      <i class="fa-solid fa-spinner fa-spin text-xl"></i>
      } @else {
      <i class="fa-solid fa-paperclip text-xl"></i>
      }
    </button>

    <div class="flex-1 relative">
      <textarea #textarea [(ngModel)]="content" (input)="onInput()" (keydown)="onKeydown($event)"
        [placeholder]="placeholder()" [disabled]="isSending()" rows="1"
        class="w-full px-4 py-3 border border-neutral-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-neutral-500 resize-none disabled:opacity-50 disabled:cursor-not-allowed min-h-[48px] max-h-[120px]">
      </textarea>
    </div>

    <button (click)="onSend()" [disabled]="!canSend()"
      class="bg-neutral-500 text-white p-3 rounded-lg hover:bg-neutral-600 focus:outline-none focus:ring-2 focus:ring-neutral-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      [attr.aria-label]="isSending() ? 'Sending message' : 'Send message'">
      @if (isSending()) {
      <i class="fa-solid fa-spinner fa-spin"></i>
      } @else {
      <i class="fa-solid fa-paper-plane"></i>
      }
    </button>
  </div>
</div>
